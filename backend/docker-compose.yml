services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-taskflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskflow}
      POSTGRES_DB: ${DB_NAME:-taskflow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskflow}"]
      interval: 2s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    entrypoint: ["taskflow-migrate"]
    command: ["up"]
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    ports:
      - "${PORT:-8066}:8066"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      PORT: "8066"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
